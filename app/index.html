<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>工作室物品管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>工作室物品管理</h1>
        <p id="storageStatus">本地检测版</p>
      </div>
      <button id="resetDemo" class="ghost">重置样例</button>
    </header>

    <nav class="tabs" aria-label="主功能">
      <button class="tab active" data-view="scanView">快捷扫码</button>
      <button class="tab" data-view="inventoryView">查库存</button>
      <button class="tab" data-view="createView">新增</button>
      <button class="tab" data-view="transactionView">流水</button>
    </nav>

    <main>
      <section id="scanView" class="view active">
        <div class="scan-panel">
          <div class="mode-row" aria-label="扫码操作">
            <button class="mode" data-mode="stocktake">盘点称重</button>
            <button class="mode" data-mode="move">绑定库位</button>
          </div>

          <div class="status-strip">
            <div>
              <span class="label">操作</span>
              <strong id="scanModeLabel">查库存</strong>
            </div>
            <div>
              <span class="label">重量</span>
              <strong id="pendingWeight">未扫描</strong>
            </div>
            <div>
              <span class="label">物品</span>
              <strong id="pendingItem">未扫描</strong>
            </div>
            <div>
              <span class="label">库位</span>
              <strong id="pendingLocation">未扫描</strong>
            </div>
          </div>

          <div class="camera-scanner">
            <div class="scanner-head">
              <div>
                <strong>相机扫码</strong>
                <span id="scannerStatus">未启动</span>
              </div>
              <div class="scanner-actions">
                <button id="startCameraScan" type="button">开始扫码</button>
                <button id="stopCameraScan" type="button" class="ghost" disabled>停止</button>
              </div>
            </div>
            <div id="scannerViewport" class="scanner-viewport">
              <video id="scannerVideo" playsinline muted></video>
              <canvas id="scannerCanvas" hidden></canvas>
              <div class="scanner-frame" aria-hidden="true"></div>
            </div>
            <button id="toggleTorch" type="button" class="ghost torch-button" hidden disabled>打开手电筒</button>
          </div>

          <details class="manual-scan">
            <summary>手动补录和测试</summary>
            <div class="scan-input">
              <input id="scanText" autocomplete="off" placeholder="payload：spool:PLA-BLK-001 / weight:712.4 / location:RACK-A01" />
              <button id="scanSubmit">处理</button>
            </div>

            <div class="quick-payloads">
              <button data-payload="spool:PLA-BLK-001">黑 PLA 卷</button>
              <button data-payload="weight:712.4">重量 712.4g</button>
              <button data-payload="part:M3-INSERT">M3 螺母</button>
              <button data-payload="weight:256.0">重量 256g</button>
              <button data-payload="location:RACK-A01">A01 库位</button>
            </div>
          </details>

          <div id="scanResult" class="result">扫物品码自动查库存；扫重量码自动进入盘点称重。</div>
          <div id="scanLog" class="scan-log"></div>
        </div>
      </section>

      <section id="inventoryView" class="view">
        <div class="sync-panel">
          <div>
            <span class="label">数据保存</span>
            <strong>本地自动保存</strong>
            <p>云同步未接入；快照只作为备份和调试入口。</p>
          </div>
          <button type="button" class="ghost" disabled>云同步未接入</button>
        </div>

        <div class="toolbar">
          <input id="searchText" placeholder="搜索 ID、名称、材料、颜色、库位" />
          <select id="inventoryTypeFilter" aria-label="库存类型">
            <option value="all">全部</option>
            <option value="spool">耗材卷</option>
            <option value="part">零件</option>
          </select>
          <select id="archiveStatusFilter" aria-label="归档状态">
            <option value="active">启用</option>
            <option value="all">全部状态</option>
            <option value="archived">已归档</option>
          </select>
          <label class="inline-toggle">
            <input id="lowStockOnly" type="checkbox" />
            低库存
          </label>
        </div>

        <details class="backup-tools">
          <summary>备份和调试</summary>
          <div class="toolbar">
            <button id="mergeImportData" type="button" class="ghost">合并导入快照</button>
            <button id="replaceImportData" type="button" class="ghost">覆盖恢复快照</button>
            <button id="exportData" type="button" class="ghost">导出本地备份</button>
          </div>
          <input id="importFile" class="hidden-input" type="file" accept="application/json,.json" />
          <div id="importPreview" class="import-preview" hidden></div>
        </details>

        <div id="inventorySummary" class="list-summary"></div>
        <div id="inventoryList" class="inventory-list"></div>
      </section>

      <section id="createView" class="view">
        <form id="catalogForm" class="catalog-form">
          <div class="form-header">
            <h2 id="catalogFormTitle">新增耗材卷</h2>
            <button type="button" id="newCatalogItem" class="ghost">新建</button>
            <button type="button" id="scanCatalogItem" class="ghost">扫码录入</button>
            <button type="button" id="cloneCatalogItem" class="ghost">克隆</button>
            <button type="button" id="archiveCatalogItem" class="ghost">归档</button>
          </div>

          <div id="catalogScanPanel" class="catalog-scan-panel" hidden>
            <div class="scanner-head catalog-scanner-head">
              <div>
                <strong id="catalogScannerTitle">扫码录入</strong>
                <span id="catalogScannerStatus">扫物品码载入，扫重量或库位码填当前表单。</span>
              </div>
              <div class="scanner-actions">
                <button id="startCatalogCameraScan" type="button">开始扫码</button>
                <button id="stopCatalogCameraScan" type="button" class="ghost" disabled>停止</button>
                <button id="closeCatalogScanner" type="button" class="ghost">收起</button>
              </div>
            </div>
            <div id="catalogScannerViewport" class="scanner-viewport compact">
              <video id="catalogScannerVideo" playsinline muted></video>
              <canvas id="catalogScannerCanvas" hidden></canvas>
              <div class="scanner-frame" aria-hidden="true"></div>
            </div>
            <div class="scan-input compact-input">
              <input id="catalogScanText" autocomplete="off" placeholder="spool:PLA-BLK-001 / weight:712.4 / location:RACK-A01" />
              <button id="catalogScanSubmit" type="button">填入</button>
            </div>
          </div>

          <div class="form-grid catalog-grid">
            <label>
              类型
              <select id="catalogType" name="itemType">
                <option value="spool">耗材卷</option>
                <option value="part">零件</option>
              </select>
            </label>
            <label>
              ID
              <input id="catalogId" name="id" placeholder="PLA-BLK-002" />
            </label>
            <button id="generateCatalogId" type="button" class="ghost">生成 ID</button>
            <label>
              名称
              <input id="catalogName" name="name" placeholder="PLA+ / M3 热熔螺母" />
            </label>

            <label data-catalog-field="spool">
              品牌
              <input name="brand" placeholder="Bambu / eSUN" />
            </label>
            <label data-catalog-field="spool">
              材料
              <input name="material" placeholder="PLA / PETG / ABS" />
            </label>
            <label data-catalog-field="spool">
              颜色
              <input name="color" placeholder="黑色" />
            </label>
            <label data-catalog-field="spool">
              空卷重量(g)
              <input name="empty_wt" inputmode="decimal" placeholder="178" />
            </label>
            <label data-catalog-field="spool">
              当前毛重(g)
              <input name="current_wt" inputmode="decimal" placeholder="712.4" />
            </label>

            <label data-catalog-field="part" hidden>
              单件重量(g)
              <input name="unit_wt" inputmode="decimal" placeholder="0.27" />
            </label>
            <label data-catalog-field="part" hidden>
              容器重量(g)
              <input name="container_wt" inputmode="decimal" placeholder="42" />
            </label>
            <label data-catalog-field="part" hidden>
              估算数量
              <input name="estimated_qty" inputmode="numeric" placeholder="800" />
            </label>

            <label>
              库位
              <input name="location" placeholder="RACK-A01" />
            </label>
            <label>
              报警值
              <input name="min_alarm" inputmode="decimal" placeholder="100" />
            </label>
            <input name="archived_at" type="hidden" />
            <button id="saveCatalogItem" type="submit">保存物品</button>
          </div>
          <div id="catalogMessage" class="form-message">点库存列表里的物品可载入编辑。</div>
        </form>

        <div class="catalog-form label-section">
          <div class="form-header">
            <h2>生成标签</h2>
          </div>
          <div class="toolbar">
            <select id="labelItem"></select>
            <button id="makeItemQr">生成标签</button>
          </div>
          <div class="label-preview">
            <div id="labelQr" class="qr-box"></div>
            <div>
              <h2 id="labelTitle">选择物品</h2>
              <p id="labelMeta">生成后贴到物品上，库存操作从扫码开始。</p>
            </div>
          </div>
        </div>
      </section>

      <section id="transactionView" class="view">
        <div id="transactionList" class="inventory-list"></div>
      </section>
    </main>

    <template id="itemTemplate">
      <article class="item-row">
        <div class="item-main">
          <div class="item-title"></div>
          <div class="item-meta"></div>
        </div>
        <div class="item-stock"></div>
      </article>
    </template>

    <script src="./vendor/jsQR.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
